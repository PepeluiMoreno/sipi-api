[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sipi-api"
version = "0.1.0"
description = "API GraphQL para el sistema SIPI"
requires-python = ">=3.11"
readme = "README.md"
license = {text = "MIT"}

dependencies = [
    # Base de datos y ORM
    # sipi-core>=0.1.0
    "sqlalchemy[asyncio]~=2.0.36",
    "alembic~=1.14.0",
    "asyncpg~=0.30.0",
    "psycopg[binary]~=3.2.3",
    "GeoAlchemy2~=0.15.2",
    
    # GraphQL
    "strawberry-graphql[asgi]~=0.243.0",
    "strawberry-sqlalchemy-mapper~=0.8.0",
    "aiodataloader~=0.3.0",
    
    # Servidor web
    "uvicorn[standard]~=0.32.1",
    "starlette~=0.41.3",
    "fastapi~=0.128.0",
    
    # Utilidades
    "pandas>=2.2.0,<3.0.0",
    "requests~=2.32.0",
    "python-dotenv~=1.0.1",
    "unidecode~=1.3.8",
    
    # Geoespacial
    "Shapely~=2.1.2",
    "geopy~=2.4.0",
    "osmnx[all]~=2.0.7",
    
    # Pydantic
    "pydantic~=2.9.2",
    "pydantic-core~=2.23.2",
    "httpx[http2]~=0.24.1",
    
    # ETL/Scraping
    "aiohttp~=3.10.0",
    "beautifulsoup4~=4.12.0",
    "openpyxl~=3.1.2",
    "xlrd~=2.0.1",
    "psutil~=5.9.0",
    "tqdm~=4.66.0",
    "chardet~=5.2.0",
    "python-dateutil~=2.9.0",
    
    # Logging
    "structlog~=24.3.0",
]

[project.optional-dependencies]
test = [
    "pytest~=8.3.2",
    "pytest-asyncio~=0.24.0",
]

dev = [
    "pytest~=8.3.2",
    "pytest-asyncio~=0.24.0",
    "ruff",
    "mypy",
    "pre-commit",
]

[tool.hatch.build.targets.wheel]
packages = ["sipi_api"]

# ===========================================
# CONFIGURACIÓN DE HERRAMIENTAS
# ===========================================

[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]